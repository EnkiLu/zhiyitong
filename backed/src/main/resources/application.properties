server.port=8080
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=deepseek-r1:8b
langchain4j.ollama.chat-model.temperature=0.8
langchain4j.ollama.chat-model.timeout=PT60S
#ollama-log
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

#ali
langchain4j.community.dashscope.chat-model.api-key=you-api-key
langchain4j.community.dashscope.chat-model.model-name=qwen-max

#ali-Qwen-v3
langchain4j.community.dashscope.embedding-model.api-key=you-api-key
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v3

#ali-Qwen-streaming-output
langchain4j.community.dashscope.streaming-chat-model.api-key=you-api-key
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus

#MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/chat_memory_db

#log-debug/info
logging.level.root=info

# mysql
spring.datasource.url=jdbc:mysql://localhost:3306/Zhiyitong?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# mysql-log
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl



