<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fc4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>
  <rect x="82" y="38" width="36" height="124" rx="10" fill="url(#crossGrad)" opacity="0.95"/>
  <rect x="38" y="82" width="124" height="36" rx="10" fill="url(#crossGrad)" opacity="0.95"/>
  <polyline points="28,100 52,100 62,72 72,128 82,100 118,100 128,72 138,128 148,100 172,100"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.45" filter="url(#glow)"/>
  <circle cx="100" cy="26" r="4" fill="white" opacity="0.5"/>
  <circle cx="174" cy="100" r="4" fill="white" opacity="0.5"/>
  <circle cx="100" cy="174" r="4" fill="white" opacity="0.5"/>
  <circle cx="26" cy="100" r="4" fill="white" opacity="0.5"/>
</svg>
